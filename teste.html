<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #1f1f1f;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-end;
        }
        main{
            background-color: white;
            width: 400px;
            border-radius: 0 0 20px 20px;
            padding: 10px;
            position: relative;
            gap: 10px;
        }
        .car{
            width: 100%;
            color: white;
            background-color: red;
            text-align: center;
            padding: 5px;
            border-radius: 5px;
        }
        .fixo{
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            font-size: 1.2rem;
            padding: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding-bottom: 10px;
        }
        button{
            width: 100%;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            background-color: red;
            color: white;
            font-size: 1.2rem;
        }
        button:hover{
            cursor: pointer;
            background-color: rgb(214, 4, 4);
            transition: 0.2s;
        }
        .grid{
            width: 100%;
            border: 1px solid rgba(0, 0, 0, 0.407);
            margin: auto;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 1.2rem;
            display: flex;
            flex-direction: column;
            gap:5px;
        }
        p,.meio{
            padding: 0 0 0 5px;
        }
        .meio{
            display: flex;
            gap: 5px;
            padding-bottom: 5px;
        }
        .cima{
            width: 100%;
            padding: 5px;
            display: flex;
            align-items: center;
        }
        .cima img{
            width: 40px;
            height: 40px;
            border-radius: 99999px;

        }
        .cima p{
            font-size: 1.2rem;
            padding-left: 15px;
        }
        .meio{
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <main>
       <div class="car">
            <h2>
                Seu Carrinho
            </h2>
       </div>
       <div class="grid">
        <div class="cima">
            <picture>
                <img src="assets/images/churros.webp" alt="churros">
            </picture>
                <p>
                    Espetinho
                </p>
        </div>
            <div class="meio">
                Valor RS 40,00
            </div>
       </div>
       <div class="fixo">
            <div class="meio">
                <p>
                    Valor:
                </p>
                <p>
                    R$
                </p>
                <p>
                    30,00
                </p>
            </div>
            <button>
                Pagar
            </button>
       </div>
    </main>
</body>
</html>
